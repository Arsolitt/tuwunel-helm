{{- if .Values.rtc.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tuwunel.fullname" . }}-livekit
  labels:
    {{- include "tuwunel.labels" . | nindent 4 }}
    app.kubernetes.io/component: rtc-livekit
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      {{- include "tuwunel.labels" . | nindent 6 }}
      app.kubernetes.io/component: rtc-livekit
  template:
    metadata:
      labels:
        {{- include "tuwunel.labels" . | nindent 8 }}
        app.kubernetes.io/component: rtc-livekit
    spec:
      hostNetwork: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: config-processor
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - envsubst < /tmp/config-template/livekit.yaml > /tmp/config/livekit.yaml
          {{- if or (.Values.rtc.livekit.env) (.Values.rtc.livekit.envRaw) (.Values.rtc.livekit.envFromSecret) }}
          env:
          {{- range $key, $val := .Values.rtc.livekit.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
          {{- end }}
          {{- if .Values.rtc.livekit.envRaw }}
            {{- with .Values.rtc.livekit.envRaw }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- range $key, $val := .Values.rtc.livekit.envFromSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ (split "/" $val)._0 }}
                  key: {{ (split "/" $val)._1 }}
          {{- end }}
          {{- end }}
          volumeMounts:
            - name: config-template
              mountPath: /tmp/config-template
            - name: config
              mountPath: /tmp/config
            - name: tmp
              mountPath: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: livekit
          image: "{{ .Values.rtc.livekit.image.repository }}:{{ .Values.rtc.livekit.image.tag }}"
          imagePullPolicy: {{ .Values.rtc.livekit.image.pullPolicy }}
          args: ["--config", "/tmp/config/livekit.yaml"]
          ports:
            - name: http
              containerPort: {{ .Values.rtc.livekit.config.port }}
            - name: rtc-tcp
              containerPort: {{ .Values.rtc.livekit.config.rtc.tcp_port }}
          volumeMounts:
            - name: config
              mountPath: /tmp/config
            - name: tmp
              mountPath: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.rtc.livekit.resources | nindent 12 }}
      volumes:
        - name: config-template
          configMap:
            name: {{ include "tuwunel.fullname" . }}-livekit
        - name: config
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{- end }}
