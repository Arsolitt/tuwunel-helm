## This is where people will reach you at.  If you set this to
## example.com, your usernames will look like steve:example.com.
## You probably want this to be your apex domain.
server_name: "yourdomain.com"

## Example full RTC configuration (for quick reference)
## Uncomment and modify as needed:
# rtc:
#   enabled: true
#   domain: "matrix-rtc.yourdomain.com"
#   jwt:
#     env:
#       LIVEKIT_URL: "wss://matrix-rtc.yourdomain.com"
#       LIVEKIT_FULL_ACCESS_HOMESERVERS: "yourdomain.com"
#     envFromSecret:
#       LIVEKIT_KEY: livekit-secrets/LIVEKIT_KEY
#       LIVEKIT_SECRET: livekit-secrets/LIVEKIT_SECRET
#   livekit:
#     envFromSecret:
#       LIVEKIT_KEY: livekit-secrets/LIVEKIT_KEY
#       LIVEKIT_SECRET: livekit-secrets/LIVEKIT_SECRET
#     config:
#       keys:
#         "${LIVEKIT_KEY}": "${LIVEKIT_SECRET}"
#   ingress:
#     enabled: true
#     class: nginx
#     tls: true
#     # TLS secret name (defaults to <release-name>-rtc-tls if not specified)
#     tlsSecretName: ""
# 
# ## Then add to config.global.well_known:
# config:
#   global:
#     well_known:
#       rtc_transports:
#         - type: livekit
#           livekit_service_url: "https://matrix-rtc.yourdomain.com"

image:
  repository: ghcr.io/matrix-construct/tuwunel
  tag: v1.5.0
  pullPolicy: IfNotPresent

## Init container for envsubst
initContainer:
  image:
    repository: dibi/envsubst
    tag: "1"
    pullPolicy: IfNotPresent

## The keys under config must be valid for the configuration file of
## Conduwuit, Tuwunel, or Continuwuity as this section is converted into
## the configuration file
config:
  global:
    allow_registration: "true"
    registration_token: "supa-dupa-secret-token"
    allow_federation: "false"
    trusted_servers: []
    tls: {}
    
    ## Plain text environment variables
    env: {}
    
    ## Raw environment variable sections (for complex configurations)
    envRaw: []
    
    ## Environment variables from Kubernetes secrets
    ## Format: VARIABLE_NAME: secret-name/key-name
    envFromSecret: {}
    
    ## Well-known configuration
    ## Used for Matrix server discovery and RTC services
    well_known: {}
    ## Example with RTC configuration:
    # well_known:
    #   ## Client delegation (if using delegated domain)
    #   client: "https://matrix.yourdomain.com"
    #   server: "matrix.yourdomain.com:443"
    #   
    #   ## RTC transports for Element Call
    #   ## This enables Matrix RTC functionality
    #   ## Replace matrix-rtc.yourdomain.com with your RTC domain
    #   rtc_transports:
    #     - type: livekit
    #       livekit_service_url: "https://matrix-rtc.yourdomain.com"
    
    ## If you are delegating your apex domain, uncomment the client and server lines
    ## and replace the domains with the domain your service is running on
    #  client: "https://matrix.example.com"
    #  server: "matrix.example.com:443"
    blurhashing: {}
    ldap: {}
    antispam: {}
      # meowlnir: {}
      # draupnir: {}


extraEnv: []

## Add additional labels to all resources
extraLabels: {}

## Add annotations to the StatefulSet
statefulsetAnnotations: {}

service:
  annotations: {}
  type: ClusterIP
  clusterIP: "None"

  port: 80
  ## List of IP addresses at which the service is available
  ## Ref: https://kubernetes.io/docs/user-guide/services/#external-ips
  ##
  externalIPs: []

  loadBalancerIP: ""
  loadBalancerSourceRanges: []

ingress:
  enabled: false
  class: ""
  # You will probably want to provide either large upload size limits, or no
  #    upload size limit; for example, if using nginx-ingress, include
  #    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  annotations: {}
  path: /
  ## Your server_name and delegated domain (if any) are already added
  ## to the Ingress
  extraHosts: []
  ## If you enable TLS, don't forget to set annotations for cert-manager
  tls: false
  ## TLS secret name (defaults to <release-name>-tls if not specified)
  tlsSecretName: ""

## Persist configuration to a persistent volume
persistence:
  ## Data Persistent Volume Storage Class
  ## If defined, storageClassName: <storageClass>
  ## If unset, storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  data:
    enabled: true
    existingClaim: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    # Your database and uploads will live here
    size: 4Gi

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "1"
    memory: "512Mi"

nodeSelector: {}

tolerations: []

affinity: {}

## Matrix RTC (Real-Time Communication) Configuration
## Enables Element Call functionality via LiveKit integration
## 
## Prerequisites:
## 1. Create Kubernetes secret with LiveKit credentials:
##    kubectl create secret generic livekit-secrets \
##      --from-literal=LIVEKIT_KEY=<20-char-key> \
##      --from-literal=LIVEKIT_SECRET=<64-char-secret>
##
## 2. Configure DNS for RTC domain (e.g., matrix-rtc.yourdomain.com)
##
## 3. Update config.global.well_known.rtc_transports with your RTC domain
##
## Documentation: https://github.com/element-hq/lk-jwt-service
rtc:
  ## Enable Matrix RTC support (default: false)
  enabled: false
  
  ## RTC domain where LiveKit services will be accessible
  ## Example: matrix-rtc.yourdomain.com
  ## This domain needs DNS configured to point to your cluster
  domain: ""
  
  ## JWT Service Configuration
  ## Handles authentication tokens for LiveKit
  jwt:
    image:
      repository: ghcr.io/element-hq/lk-jwt-service
      tag: 0.4.1
      pullPolicy: IfNotPresent
    
    ## Plain text environment variables
    ## Example:
    ## env:
    ##   LIVEKIT_URL: "wss://matrix-rtc.yourdomain.com"
    ##   LIVEKIT_JWT_BIND: ":8080"
    env: {}
    
    ## Raw environment variable sections (for complex configurations)
    envRaw: []
    
    ## Environment variables from Kubernetes secrets
    ## Format: VARIABLE_NAME: secret-name/key-name
    ## The secret must contain LIVEKIT_KEY and LIVEKIT_SECRET
    ## 
    ## Example:
    ## envFromSecret:
    ##   LIVEKIT_KEY: livekit-secrets/LIVEKIT_KEY
    ##   LIVEKIT_SECRET: livekit-secrets/LIVEKIT_SECRET
    envFromSecret: {}
  
  ## LiveKit Media Server Configuration
  ## Handles WebRTC media streams for calls
  livekit:
    image:
      repository: livekit/livekit-server
      tag: v1.9.11
      pullPolicy: IfNotPresent
    
    ## Plain text environment variables
    env: {}
    
    ## Raw environment variable sections (for complex configurations)
    envRaw: []
    
    ## Environment variables from Kubernetes secrets
    ## At minimum, requires LIVEKIT_KEY and LIVEKIT_SECRET
    ## 
    ## Example:
    ## envFromSecret:
    ##   LIVEKIT_KEY: livekit-secrets/LIVEKIT_KEY
    ##   LIVEKIT_SECRET: livekit-secrets/LIVEKIT_SECRET
    envFromSecret: {}
    
    ## Network mode for LiveKit pods
    ## Currently only hostNetwork is supported
    ## Pod uses host network namespace for direct access to host ports
    ## Required for WebRTC connections
    networkMode: "hostNetwork"
    
    ## TODO: Implement LoadBalancer support for cloud deployments
    ## This will allow using Kubernetes LoadBalancer service instead of hostNetwork
    ## Benefits:
    ##   - Preserves client source IP with externalTrafficPolicy: Local
    ##   - Better cloud integration
    ##   - No need for host network access
    ## Requirements:
    ##   - Cloud provider LoadBalancer support
    ##   - Proper port configuration for UDP range
    
    ## LiveKit server configuration
    ## This is converted to livekit.yaml and processed with envsubst
    ## Documentation: https://docs.livekit.io/guides/getting-started
    config:
      ## HTTP server port
      port: 7880
      ## Network interfaces to bind (empty = all interfaces)
      bind_addresses: [""]
      
      ## WebRTC configuration
      rtc:
        ## TCP port for RTC connections
        tcp_port: 7881
        ## UDP port range for media streams
        ## These ports must be accessible from clients
        ## For LoadBalancer mode, configure your cloud provider
        ## For hostNetwork mode, ensure firewall allows these ports
        port_range_start: 50100
        port_range_end: 50200
        ## Use external IP for ICE candidates (recommended)
        use_external_ip: true
        ## Disable loopback ICE candidates (for security)
        enable_loopback_candidate: false
      
      ## LiveKit API keys
      ## Use envsubst placeholders that will be replaced from secrets
      ## Example:
      ## keys:
      ##   "${LIVEKIT_KEY}": "${LIVEKIT_SECRET}"
      keys: {}
  
  ## Ingress configuration for RTC domain
  ingress:
    ## Enable RTC ingress (default: false)
    enabled: false
    
    ## Ingress class (e.g., nginx, traefik)
    class: ""
    
    ## Additional annotations for ingress
    ## Example for nginx-ingress:
    ## annotations:
    ##   cert-manager.io/cluster-issuer: "letsencrypt-prod"
    ##   nginx.ingress.kubernetes.io/proxy-body-size: "0"
    annotations: {}
    
    ## Enable TLS (recommended for production)
    tls: false
    
    ## TLS secret name (defaults to <release-name>-rtc-tls)
    ## Required if tls is enabled
    tlsSecretName: ""
